main:
  components_repository: "components"
  project_name: nyc_airbnb
  experiment_name: development
  # Comma-separated list of steps to run, or "all" to run the full pipeline.
  # Example: steps=basic_cleaning,data_check
  steps: all
etl:
  sample: "sample1.csv"
  min_price: 10  # dollars — listings below this threshold are treated as data errors
  max_price: 350 # dollars — listings above this threshold are outliers that skew the model
data_check:
  # Maximum KL divergence allowed between the new data and the reference distribution.
  # Exceeding this threshold signals a potential data drift issue.
  kl_threshold: 0.2
modeling:
  # Fraction of the full dataset held out as a final test set (never seen during training)
  test_size: 0.2
  # Fraction of the remaining (train+val) data used for validation during training
  val_size: 0.2
  # Fixed seed for reproducible train/val/test splits across runs
  random_seed: 42
  # Stratify splits by borough to preserve the neighbourhood_group distribution
  stratify_by: "neighbourhood_group"
  # Maximum vocabulary size for the TF-IDF applied to the listing "name" column.
  # Tuned via Hydra sweep; higher values increase dimensionality with diminishing returns.
  max_tfidf_features: 30
  random_forest:
    n_estimators: 100
    max_depth: 15
    min_samples_split: 4
    min_samples_leaf: 3
    n_jobs: -1  # use all available CPU cores
    criterion: squared_error
    max_features: 0.33
    oob_score: true  # out-of-bag score provides a free internal validation estimate
